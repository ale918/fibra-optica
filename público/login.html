<<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airnet — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #0d0f12;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #14171c;
      border: 1px solid #2a2f3a;
      border-radius: 14px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      color: #00d4aa;
      text-align: center;
      margin-bottom: 6px;
    }
    .logo-sub {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 14px;
    }
    label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, select {
      background: #1c2028;
      border: 1px solid #2a2f3a;
      border-radius: 8px;
      color: #e8eaf0;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus, select:focus { border-color: #00d4aa; }
    select option { background: #1c2028; }
    button.btn-login {
      width: 100%;
      background: #00d4aa;
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    button.btn-login:hover { background: #00bfa0; }
    .error {
      background: rgba(255,77,77,0.1);
      border: 1px solid rgba(255,77,77,0.3);
      border-radius: 8px;
      color: #ff4d4d;
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 12px;
      display: none;
      text-align: center;
    }
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 40px; }
    .pass-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">⬡ Airnet</div>
    <div class="logo-sub">Control de materiales</div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="username" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" />
        <button class="pass-toggle" onclick="togglePass()" type="button">👁</button>
      </div>
    </div>

    <div class="form-group">
      <label>¿Quién eres?</label>
      <select id="nombre-login">
        <option value="">Selecciona tu nombre...</option>
        <option value="Efrain">Efrain</option>
        <option value="Alejandro">Alejandro</option>
        <option value="David Garcia">David Garcia</option>
      </select>
    </div>

    <button class="btn-login" onclick="login()">Iniciar sesión</button>
    <div class="error" id="error-msg">Usuario o contraseña incorrectos</div>
  </div>

  <script>
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function togglePass() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function login() {
      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;
      const nombre = document.getElementById('nombre-login').value;

      if (!usuario || !password || !nombre) {
        const err = document.getElementById('error-msg');
        err.style.display = 'block';
        err.textContent = 'Completa todos los campos';
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password, nombre })
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          const err = document.getElementById('error-msg');
          err.style.display = 'block';
          err.textContent = 'Usuario o contraseña incorrectos';
        }
      } catch(e) {
        document.getElementById('error-msg').style.display = 'block';
      }
    }
  </script>
</body>
</html>
